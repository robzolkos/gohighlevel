name: release

# Publishes the gem to RubyGems when a GitHub Release is published.
# Uses OIDC trusted publishing — no API key is stored in the repo.
# One-time setup: add robzolkos/gohighlevel as a trusted publisher on
# rubygems.org (workflow: release.yml).

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
      - name: Publish to RubyGems
        uses: rubygems/release-gem@v1
