AllCops:
  TargetRubyVersion: 3.3
  NewCops: enable
  SuggestExtensions: false
  Exclude:
    - "vendor/**/*"
    - "tmp/**/*"
    - "coverage/**/*"
    - "pkg/**/*"

Style/StringLiterals:
  EnforcedStyle: double_quotes

Style/StringLiteralsInInterpolation:
  EnforcedStyle: double_quotes

Style/Documentation:
  Enabled: false

Metrics/BlockLength:
  Exclude:
    - "test/**/*"
    - "*.gemspec"
    - "Rakefile"

Metrics/MethodLength:
  Exclude:
    - "test/**/*"
    - "script/generate.rb"

Metrics/AbcSize:
  Exclude:
    - "test/**/*"
    - "script/generate.rb"

Metrics/ClassLength:
  Exclude:
    - "test/**/*"
    - "lib/high_level/resources/**/*"
    - "lib/high_level/models/**/*"
    - "script/generate.rb"

Metrics/CyclomaticComplexity:
  Exclude:
    - "script/generate.rb"

Metrics/PerceivedComplexity:
  Exclude:
    - "script/generate.rb"

Naming/MethodParameterName:
  Exclude:
    - "script/generate.rb"

Layout/LineLength:
  Exclude:
    - "lib/high_level/resources/**/*"
    - "lib/high_level/models/**/*"

Metrics/ParameterLists:
  CountKeywordArgs: false

Naming/FileName:
  Exclude:
    - "lib/gohighlevel.rb"

# Storage backends intentionally mirror the TS SDK's setClientId name.
Naming/AccessorMethodName:
  Exclude:
    - "lib/high_level/storage/**/*"
    - "test/**/*"
